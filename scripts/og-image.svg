<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="David Jensenius — terminal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0d10" />
      <stop offset="1" stop-color="#050506" />
    </linearGradient>
    <style>
      .mono { font-family: "SFMono-Regular", "SF Mono", Menlo, Monaco, "DejaVu Sans Mono", "Courier New", monospace; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- faint diagonal scanline accent, echoing the site's quiet aesthetic -->
  <g stroke="#1a1a20" stroke-width="1" opacity="0.6">
    <line x1="0" y1="120" x2="1200" y2="-180" />
    <line x1="0" y1="360" x2="1200" y2="60" />
    <line x1="0" y1="600" x2="1200" y2="300" />
    <line x1="0" y1="840" x2="1200" y2="540" />
  </g>

  <!-- terminal window -->
  <rect x="90" y="86" width="1020" height="458" rx="16" fill="#0b0b0b" stroke="#242430" stroke-width="1.5" />

  <!-- title bar -->
  <rect x="90" y="86" width="1020" height="52" rx="16" fill="#101014" />
  <rect x="90" y="120" width="1020" height="18" fill="#101014" />
  <circle cx="124" cy="112" r="8" fill="#ff5f56" />
  <circle cx="152" cy="112" r="8" fill="#ffbd2e" />
  <circle cx="180" cy="112" r="8" fill="#27c93f" />
  <text x="600" y="118" text-anchor="middle" class="mono" font-size="20" fill="#6a6a72">dfj — terminal</text>

  <!-- body -->
  <g class="mono">
    <!-- whoami -->
    <text x="132" y="212" font-size="28" xml:space="preserve"><tspan fill="#7aa2f7">dfj:~$</tspan><tspan fill="#d7d7d7"> whoami</tspan></text>
    <text x="132" y="288" font-size="66" font-weight="700" fill="#ffffff">David Jensenius</text>

    <!-- cat bio -->
    <text x="132" y="366" font-size="28" xml:space="preserve"><tspan fill="#7aa2f7">dfj:~$</tspan><tspan fill="#d7d7d7"> cat bio.txt</tspan></text>
    <text x="132" y="414" font-size="32" fill="#9aa0a6">Composer and media artist.</text>

    <!-- prompt with cursor -->
    <text x="132" y="492" font-size="28">
      <tspan fill="#7aa2f7">dfj:~$</tspan>
    </text>
    <rect x="238" y="470" width="17" height="30" fill="#9ece6a" />
  </g>

  <!-- footer domain -->
  <text x="1070" y="512" text-anchor="end" class="mono" font-size="22" fill="#7aa2f7">david.jensenius.com</text>
</svg>
