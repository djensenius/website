name: Deploy preview to GitHub Pages

on:
  push:
    branches: [main]
    # Pushes that only touch the emulator image sources are handled by the
    # build-v86-image workflow, which rebuilds the image and then calls this
    # workflow — so skip the redundant pre-rebuild deploy for those.
    paths-ignore:
      - 'scripts/v86-image/**'
      - 'scripts/build-v86-image.sh'
      - '.github/workflows/build-v86-image.yml'
  workflow_dispatch:
  # Reusable: the build-v86-image workflow calls this after publishing a fresh
  # emulator image so the new image ships immediately.
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one so a running
# deploy always finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (GitHub Pages preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up tools (mise → Node, just)
        uses: jdx/mise-action@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: just install

      # The v86 emulator image (bzimage + initrd) is not committed to git; pull
      # it from the rolling `emulator-image` release so the built site includes a
      # bootable emulator. See scripts/fetch-v86-image.sh.
      - name: Fetch emulator image
        env:
          GH_TOKEN: ${{ github.token }}
        run: just v86-fetch

      - name: Build
        # site + base come from the Pages deployment so links resolve under the
        # project subpath (e.g. https://djensenius.github.io/website/).
        env:
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: just build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
