name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up tools (mise → Node, just)
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: just install

      - name: Build
        env:
          SITE_URL: https://jensenius.com
          BASE_PATH: /
        run: just build

      - name: Audit static site
        run: npx @lhci/cli autorun --config=./lighthouserc.json
