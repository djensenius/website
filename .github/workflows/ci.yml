name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up tools (mise → Node, just)
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: just install
      - name: Check formatting
        run: just fmt-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up tools (mise → Node, just)
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: just install
      - name: Lint
        run: just lint

  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up tools (mise → Node, just)
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: just install
      - name: Type-check
        run: just type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up tools (mise → Node, just)
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: just install
      - name: Test
        run: just test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up tools (mise → Node, just)
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: just install
      - name: Build
        run: just build
