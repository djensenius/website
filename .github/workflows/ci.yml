name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format, lint, type-check, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up tools (mise → Node, just)
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: just install

      - name: Format, lint & type-check
        run: just check

      - name: Test
        run: just test

      - name: Build
        run: just build
