name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up tools (mise → Node, just)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Format, lint & type-check
        run: |
          npm run check
          npm run astro:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
